networks:
  internal:
    driver: bridge

services:

  cielo_api_web:
    build: .
    image: cielo_api_web
    container_name: cielo_api_web

    command: >
      gunicorn cieloapi.wsgi:application
      --bind 0.0.0.0:8000
      --workers=4
      --threads=4
      --worker-class=gthread
      --timeout=60
      --graceful-timeout=30
      --max-requests=1000
      --max-requests-jitter=100
      --keep-alive=5

    volumes:
      - .:/app

    env_file: .env

    ports:
      - "8001:8000"

    restart: always

    mem_limit: 600m
    mem_reservation: 300m

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - internal

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: cielo_api_postgres

    environment:
      POSTGRES_DB: ${DB_NAME:-cielo_db}
      POSTGRES_USER: ${DB_USER:-cielo_user}
      POSTGRES_PASSWORD: ${DB_PASS:-cielo_pass}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

    mem_limit: 512m
    mem_reservation: 256m

    networks:
      - internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cielo_user} -d ${DB_NAME:-cielo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
